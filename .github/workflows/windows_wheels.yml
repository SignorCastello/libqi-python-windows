name: Build and Release Windows Wheels

on:
  schedule:
    - cron: '0 0 */14 * *' # Ogni 14 giorni
  workflow_dispatch:      # Avvio manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync Upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote add upstream https://github.com/aldebaran/libqi-python.git
          git fetch upstream
          git checkout master
          git merge upstream/master --ff-only || echo "Già aggiornato"
          git push origin master

  build:
    needs: sync
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tools
        run: |
          pip install conan wheel build delvewheel
          conan profile detect --force

      - name: Prepare libqi core (Dependency)
        shell: bash
        run: |
          git clone --depth=1 https://github.com/aldebaran/libqi.git ../libqi
          
          # Script Python potenziato per neutralizzare la validazione
          python -c "
          import os, re
          path = '../libqi/conanfile.py'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  content = f.read()
              # 1. Forza gnu17 a diventare 17 ovunque
              content = content.replace('gnu17', '17')
              # 2. Cerca la funzione validate(self) e svuotala
              # Questo elimina l'errore 'The cppstd GNU extension is required' alla radice
              content = re.sub(r'def validate\(self\):.*?def', 'def validate(self):\n        pass\n\n    def', content, flags=re.DOTALL)
              with open(path, 'w') as f:
                  f.write(content)
              print('Patch applicata con successo')
          "
          conan export ../libqi --version 4.0.5

      - name: Install Dependencies with Conan
        shell: pwsh
        run: |
          # Usiamo standard 17 (MSVC) e disattiviamo i check di compatibilità rigidi
          conan install . --build=missing `
            -s build_type=Release `
            -s compiler.cppstd=17 `
            -c tools.build:skip_test=true

      - name: Build Wheel
        shell: bash
        run: |
          CONF_FILE=$(find build -name "conan_toolchain.cmake")
          python -m build --wheel --config-setting=cmake.define.CMAKE_TOOLCHAIN_FILE="$CONF_FILE"

      - name: Repair Wheel (Bundle DLLs)
        run: |
          # Delvewheel include le DLL di libqi e boost nel .whl
          if (Test-Path dist/*.whl) {
            delvewheel repair dist/*.whl -w wheelhouse/
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.python-version }}
          path: wheelhouse/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: libqi-python Windows (Py 3.10-3.12)
          body: |
            Built automatically.
          files: all-wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
