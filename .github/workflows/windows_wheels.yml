name: Build and Release Windows Wheels

on:
  schedule:
    - cron: '0 0 */14 * *' # Ogni 14 giorni
  workflow_dispatch:      # Avvio manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync Upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote add upstream https://github.com/aldebaran/libqi-python.git
          git fetch upstream
          git checkout master
          git merge upstream/master --ff-only || echo "Già aggiornato"
          git push origin master

  build:
    needs: sync
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tools
        run: |
          pip install conan wheel build delvewheel
          conan profile detect --force

      - name: Prepare libqi core (Dependency)
        shell: bash
        run: |
          git clone --depth=1 https://github.com/aldebaran/libqi.git ../libqi
          # FIX CRUCIALE: Rimuoviamo il controllo forzato su 'gnu17' che blocca MSVC
          # Cerchiamo la riga che valida lo standard e la rendiamo compatibile con MSVC (standard 17)
          sed -i 's/gnu17/17/g' ../libqi/conanfile.py
          conan export ../libqi --version 4.0.5

      - name: Install Dependencies with Conan
        shell: pwsh
        run: |
          # In Conan 2 su Windows, usiamo PowerShell (pwsh) 
          # Forziamo compiler.cppstd=17 che è il corrispettivo MSVC di gnu17
          conan install . --build=missing `
            -s build_type=Release `
            -s compiler.cppstd=17 `
            -c tools.build:skip_test=true

      - name: Build Wheel
        shell: bash
        run: |
          # Troviamo il file toolchain generato da Conan per CMake
          CONF_FILE=$(find build -name "conan_toolchain.cmake")
          python -m build --wheel --config-setting=cmake.define.CMAKE_TOOLCHAIN_FILE="$CONF_FILE"

      - name: Repair Wheel (Bundle DLLs)
        run: |
          # delvewheel aggiunge le DLL (.so di windows) dentro il pacchetto .whl
          delvewheel repair dist/*.whl -w wheelhouse/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.python-version }}
          path: wheelhouse/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Release libqi-python Windows
          body: |
            Built for Windows using GitHub Actions.
          files: all-wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
