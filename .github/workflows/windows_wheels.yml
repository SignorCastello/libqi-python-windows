name: Build and Release Windows Wheels

on:
  schedule:
    - cron: '0 0 */14 * *' # Ogni 14 giorni a mezzanotte
  workflow_dispatch:      # Permette sempre l'avvio manuale

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      new_commits: ${{ steps.sync.outputs.has_new_commits }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync Upstream
        id: sync
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git remote add upstream https://github.com/aldebaran/libqi-python.git
          git fetch upstream
          git checkout master
          if git merge upstream/master --ff-only; then
            echo "has_new_commits=true" >> $GITHUB_OUTPUT
            git push origin master
          else
            echo "has_new_commits=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: sync
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Tools
        run: |
          pip install conan wheel build delvewheel
          # FIX: Forza il profilo a usare le estensioni GNU richieste da libqi
          conan profile detect --force
          conan profile update settings.compiler.cppstd=gnu17 default

      - name: Prepare libqi core (Dependency)
        shell: bash
        run: |
          git clone --depth=1 https://github.com/aldebaran/libqi.git ../libqi
          conan export ../libqi --version 4.0.5

      - name: Install Dependencies with Conan
        run: |
          # FIX: Passiamo esplicitamente gnu17 anche nell'install
          conan install . --build=missing -s build_type=Release -s compiler.cppstd=gnu17 -c tools.build:skip_test=true

      - name: Build Wheel
        shell: bash
        run: |
          CONF_FILE=$(find build -name "conan_toolchain.cmake")
          python -m build --wheel --config-setting=cmake.define.CMAKE_TOOLCHAIN_FILE="$CONF_FILE"

      - name: Repair Wheel (Bundle DLLs)
        run: |
          # Includiamo le DLL di libqi e boost nel pacchetto finale
          delvewheel repair dist/*.whl -w wheelhouse/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.python-version }}
          path: wheelhouse/*.whl

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: all-wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Release libqi-python Windows
          body: |
            Built for Windows, updated every 14 days!
          files: all-wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
